<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fire Extinguisher Information</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="script.js" defer></script>

</head>

<body>

<div class="card">

    <!-- Header -->

    <div class="header">

        <div class="logo">

            🧯

        </div>

        <h1>MAITHON POWER LIMITED</h1>

        <p>Fire Extinguisher Information System</p>

    </div>

    <!-- Card Body -->

    <div class="card-body">

        <div class="row">

            <div class="title">Extinguisher No.</div>

            <div class="value" id="number"></div>

        </div>

        <div class="row">

            <div class="title">Extinguisher ID</div>

            <div class="value" id="id"></div>

        </div>

        <div class="row">

            <div class="title">Location</div>

            <div class="value" id="location"></div>

        </div>

        <div class="row">

            <div class="title">Type</div>

            <div class="value" id="type"></div>

        </div>

        <div class="row">

            <div class="title">Capacity</div>

            <div class="value" id="capacity"></div>

        </div>

        <div class="row">

            <div class="title">Last Inspection</div>

            <div class="value" id="lastInspection"></div>

        </div>

        <div class="row">

            <div class="title">Next Inspection</div>

            <div class="value" id="nextInspection"></div>

        </div>

        <div class="row">

            <div class="title">Fire Emergency</div>

            <div class="value" id="fireContact"></div>

        </div>

    </div>

    <!-- Buttons -->

    <div class="buttons">

        <a id="callButton" class="btn">📞 Call Fire Team</a>

    </div>

    <!-- Footer -->

    <div class="footer">

        <p>Emergency Equipment Information System</p>

        <small>Powered by Maithon Power Limited</small>

    </div>

</div>

</body>

</html>
