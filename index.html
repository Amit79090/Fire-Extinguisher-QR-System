<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fire Extinguisher QR System</title>

    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>

</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <h1>🧯</h1>

            <h2>MAITHON POWER LIMITED</h2>

            <p>Fire Extinguisher Information</p>

        </div>

        <table>

            <tr>
                <td><b>Extinguisher No.</b></td>
                <td id="number"></td>
            </tr>

            <tr>
                <td><b>Extinguisher ID</b></td>
                <td id="id"></td>
            </tr>

            <tr>
                <td><b>Location</b></td>
                <td id="location"></td>
            </tr>

            <tr>
                <td><b>Type</b></td>
                <td id="type"></td>
            </tr>

            <tr>
                <td><b>Capacity</b></td>
                <td id="capacity"></td>
            </tr>

            <tr>
                <td><b>Last Inspection</b></td>
                <td id="lastInspection"></td>
            </tr>

            <tr>
                <td><b>Next Inspection</b></td>
                <td id="nextInspection"></td>
            </tr>

            <tr>
                <td><b>Fire Contact</b></td>
                <td id="fireContact"></td>
            </tr>

        </table>

        <br>

        <a id="callButton" class="button">

            📞 Call Fire Team

        </a>

    </div>

</div>

</body>

</html>
